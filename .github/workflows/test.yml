name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        backend: [tensorflow, torch, jax]
    env:
      KERAS_BACKEND: ${{ matrix.backend }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install backend (${{ matrix.backend }})
        run: |
          case "${{ matrix.backend }}" in
            tensorflow) pip install tensorflow-cpu ;;
            torch)      pip install torch --index-url https://download.pytorch.org/whl/cpu ;;
            jax)        pip install "jax[cpu]" ;;
          esac

      - name: Install keras-hexagdly + dev/test deps
        run: |
          pip install -e .
          pip install pytest hexagdly
          # torch is also the cross-check oracle dependency, regardless of backend
          if [ "${{ matrix.backend }}" != "torch" ]; then
            pip install torch --index-url https://download.pytorch.org/whl/cpu
          fi

      - name: Run tests
        run: pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/
